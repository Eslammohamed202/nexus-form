<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Form</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f1f5f9;
    padding:20px;
}

.form-box{
    width:400px;
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    text-align:center;
}

img{
    width:140px;
    margin-bottom:15px;
}

h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border:1px solid #ccc;
    border-radius:8px;
    text-align:center;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#7223e6;
    color:#fff;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0056b3;
}

#successMessage{
    display:none;
    margin-top:20px;
    color:green;
    font-size:18px;
    font-weight:bold;
}

h3{
    padding-bottom:15px;
    color:red;
}

.loading{
    display:none;
    margin-top:10px;
    color:#555;
}

</style>
</head>

<body>

<div class="form-box">

    <img src="./images/IMG_6217.png" alt="Logo">

    <h2>Welcome To Nexus</h2>

    <form id="contactForm" enctype="multipart/form-data">

        <input type="hidden" name="_captcha" value="false">

        <input type="hidden" name="_subject" value="New Nexus Submission">

        <input 
            type="text" 
            name="name" 
            placeholder="Full Name"
            required
        >

        <input 
            type="text" 
            name="faculty" 
            placeholder="Faculty"
            required
        >

        <input 
            type="text" 
            name="university" 
            placeholder="University"
            required
        >

        <input 
            type="text" 
            name="phone" 
            placeholder="Phone Number"
            required
        >

        <p>
            💳 لإتمام الحجز، برجاء تحويل EGP على :
        </p>

        <br>

        ✔️Vodafone Cash:
        <a href="tel:01025900424">
            01025900424
        </a>

        <br>

        ✔️ InstaPay:
        <a href="tel:01558009747">
            01558009747
        </a>

        <br><br>

        بعد التحويل، قم برفع صورة واضحة للتحويل في الخانة التالية لتأكيد الحجز.

        <br><br>

        <input 
            type="file" 
            name="attachment" 
            accept="image/*"
            required
        >

        <h3>
            ⚠️ لن يتم تأكيد الحجز بدون صورة التحويل
        </h3>

        <button type="submit">
            Send
        </button>

    </form>

    <div class="loading" id="loading">
        جاري الإرسال...
    </div>

    <div id="successMessage">
        ✅ تم إرسال البيانات بنجاح
    </div>

</div>

<script>

const form = document.getElementById("contactForm");
const successMessage = document.getElementById("successMessage");
const loading = document.getElementById("loading");

form.addEventListener("submit", function(){

    loading.style.display = "block";

    setTimeout(() => {

        loading.style.display = "none";

        successMessage.style.display = "block";

        form.style.display = "none";

    }, 2000);

});

</script>

</body>
</html>
