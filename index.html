<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Nexus Form</title>

        <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f1f5f9;
        }

        .form-box{
            width:400px;
            background:#fff;
            padding:25px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.1);
            text-align:center;
        }

        img{
            width:140px;
            margin-bottom:15px;
        }

        h2{
            margin-bottom:20px;
        }

        input{    
            width:100%;
            padding:12px;
            margin-bottom:12px;
            border:1px solid #ccc;
            border-radius:8px;
            text-align:center;
            outline:none;
        }

        button{    
            width:100%;
            padding:12px;
            border:none;
            background:#7223e6;
            color:#fff;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
            }

        button:hover{
            background:#0056b3;
        }

        #successMessage{
            display:none;
            margin-top:15px;
            color:green;
            font-size:16px;
            font-weight:bold;
        }

        h3 {
            padding-bottom: 15px;
            color: red;
        }

    </style>
</head>

<body>

    <div class="form-box">

        <img src="./images/IMG_6217.png" alt="Logo">

        <h2>Welcome To Nexus</h2>

        <form 
            action="https://formsubmit.co/n15294327@gmail.com"
            method="POST"
            enctype="multipart/form-data"
        >

            <input type="hidden" name="_captcha" value="false">

            <input type="hidden" name="_subject" value="New Nexus Submission">

            <input 
                type="hidden" 
                name="_next" 
                value="success.html"
            >

            <input 
                type="text" 
                name="name" 
                placeholder="Full Name"
                required
            >

            <input 
                type="text" 
                name="faculty" 
                placeholder="Faculty"
                required
            >

            <input 
                type="text" 
                name="university" 
                placeholder="University"
                required
            >

            <input 
                type="text" 
                name="phone" 
                placeholder="Phone Number"
                required
            >

            <p>💳 لإتمام الحجز، برجاء تحويل  EGP على : </p><br>
️                  ✔️Vodafone Cash: <a href="tel:01025900424">01025900424</a> <br>
                  ✔️ InstaPay: <a href="tel:01558009747">01558009747</a> <br>
                  <br>
                بعد التحويل، قم برفع صورة واضحة للتحويل في الخانة التالية لتأكيد الحجز. <br></p>

            <input 
                type="file" 
                name="attachment" 
                accept="image/*"
                required
            >

            <h3>⚠️ لن يتم تأكيد الحجز بدون صورة التحويل</h3>

            <button type="submit">
                Send
            </button>

            </form>

            <p id="successMessage">
                ✅ تم إرسال البيانات بنجاح
            </p>

        </div>
        
</body>
</html>
